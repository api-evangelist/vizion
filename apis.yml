apis:
  - aid: vizion:container-tracking-api
    name: Vizion Container Tracking API
    description: >-
      The Vizion Container Tracking API provides standardized shipment tracking events from ocean carriers, terminals,
      rail, and customs data sources. Subscribe to a container by providing its ID and carrier SCAC code. Receive
      real-time webhook updates or poll for tracking milestones. All events follow a standardized JSON schema regardless
      of carrier.
