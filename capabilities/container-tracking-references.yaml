naftiko: 1.0.0-alpha2
info:
  label: Vizion Container Tracking API — References
  description: 'Vizion Container Tracking API — References. 4 operations. Lead operation: List Active References. Self-contained
    Naftiko capability covering one Vizion business surface.'
  tags:
  - Vizion
  - References
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VIZION_API_KEY: VIZION_API_KEY
capability:
  consumes:
  - type: http
    namespace: container-tracking-references
    baseUri: https://prod.vizionapi.com
    description: Vizion Container Tracking API — References business capability. Self-contained, no shared references.
    resources:
    - name: references
      path: /references
      operations:
      - name: listreferences
        method: GET
        description: List Active References
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number for pagination
        - name: per_page
          in: query
          type: integer
          description: Number of references per page
      - name: createreference
        method: POST
        description: Create Container Reference
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: references-reference_id
      path: /references/{reference_id}
      operations:
      - name: getreference
        method: GET
        description: Get Reference Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reference_id
          in: path
          type: string
          description: The unique identifier of the reference returned when it was created
          required: true
      - name: deletereference
        method: DELETE
        description: Delete Reference
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: reference_id
          in: path
          type: string
          description: The unique identifier of the reference to delete
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.VIZION_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: container-tracking-references-rest
    port: 8080
    description: REST adapter for Vizion Container Tracking API — References. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/references
      name: references
      description: REST surface for references.
      operations:
      - method: GET
        name: listreferences
        description: List Active References
        call: container-tracking-references.listreferences
        with:
          page: rest.page
          per_page: rest.per_page
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createreference
        description: Create Container Reference
        call: container-tracking-references.createreference
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/references/{reference-id}
      name: references-reference-id
      description: REST surface for references-reference_id.
      operations:
      - method: GET
        name: getreference
        description: Get Reference Status
        call: container-tracking-references.getreference
        with:
          reference_id: rest.reference_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletereference
        description: Delete Reference
        call: container-tracking-references.deletereference
        with:
          reference_id: rest.reference_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: container-tracking-references-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vizion Container Tracking API — References. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-active-references
      description: List Active References
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: container-tracking-references.listreferences
      with:
        page: tools.page
        per_page: tools.per_page
      outputParameters:
      - type: object
        mapping: $.
    - name: create-container-reference
      description: Create Container Reference
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: container-tracking-references.createreference
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-reference-status
      description: Get Reference Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: container-tracking-references.getreference
      with:
        reference_id: tools.reference_id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-reference
      description: Delete Reference
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: container-tracking-references.deletereference
      with:
        reference_id: tools.reference_id
      outputParameters:
      - type: object
        mapping: $.
