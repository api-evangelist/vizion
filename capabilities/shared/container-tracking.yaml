naftiko: "1.0.0-alpha1"

info:
  label: "Vizion Container Tracking API"
  description: >-
    Shared API definition for the Vizion Container Tracking REST API. Provides
    reference management for container subscriptions and retrieval of tracking
    milestone events from ocean carriers, terminals, rail, and customs.
  tags:
    - Vizion
    - Container Tracking
    - Logistics
    - Ocean Freight
    - Shipping
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VIZION_API_KEY: VIZION_API_KEY

capability:
  consumes:
    - type: http
      namespace: vizion
      baseUri: https://prod.vizionapi.com
      description: "Vizion Container Tracking REST API."
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{VIZION_API_KEY}}"
        placement: header
      resources:
        - name: references
          path: /references
          description: "Container tracking subscription management."
          operations:
            - name: list-references
              method: GET
              description: "List all active container tracking references."
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-reference
              method: POST
              description: "Subscribe to tracking updates for a container."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  container_id: "{{tools.container_id}}"
                  carrier_code: "{{tools.carrier_code}}"
                  callback_url: "{{tools.callback_url}}"

        - name: reference-detail
          path: /references/{reference_id}
          description: "Individual container tracking reference."
          operations:
            - name: get-reference
              method: GET
              description: "Get status and metadata for a specific reference."
              inputParameters:
                - name: reference_id
                  in: path
                  type: string
                  required: true
                  description: "Reference ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-reference
              method: DELETE
              description: "Cancel tracking and delete a container reference."
              inputParameters:
                - name: reference_id
                  in: path
                  type: string
                  required: true
                  description: "Reference ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: reference-updates
          path: /references/{reference_id}/updates
          description: "Tracking event updates for a reference (polling)."
          operations:
            - name: list-reference-updates
              method: GET
              description: "List all tracking milestone events for a container reference."
              inputParameters:
                - name: reference_id
                  in: path
                  type: string
                  required: true
                  description: "Reference ID"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: vizion-rest
      resources:
        - path: /v1/references
          name: references
          description: "Container tracking reference management."
          operations:
            - method: GET
              name: list-references
              description: "List active container tracking references."
              call: "vizion.list-references"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-reference
              description: "Create a container tracking reference."
              call: "vizion.create-reference"
              with:
                container_id: "rest.container_id"
                carrier_code: "rest.carrier_code"
                callback_url: "rest.callback_url"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/references/{reference_id}
          name: reference-detail
          description: "Individual reference management."
          operations:
            - method: GET
              name: get-reference
              description: "Get reference status."
              call: "vizion.get-reference"
              with:
                reference_id: "rest.reference_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-reference
              description: "Delete a reference."
              call: "vizion.delete-reference"
              with:
                reference_id: "rest.reference_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/references/{reference_id}/updates
          name: reference-updates
          description: "Tracking event polling."
          operations:
            - method: GET
              name: list-reference-updates
              description: "List tracking events for a reference."
              call: "vizion.list-reference-updates"
              with:
                reference_id: "rest.reference_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: vizion-mcp
      transport: http
      tools:
        - name: list-container-references
          description: "List all active container tracking subscriptions."
          hints:
            readOnly: true
            idempotent: true
          call: "vizion.list-references"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-container-reference
          description: "Subscribe to tracking for a container by ID and carrier SCAC code. Optionally provide a webhook callback URL."
          hints:
            readOnly: false
            idempotent: false
          call: "vizion.create-reference"
          with:
            container_id: "tools.container_id"
            carrier_code: "tools.carrier_code"
            callback_url: "tools.callback_url"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-container-reference
          description: "Get tracking status and metadata for a specific container reference."
          hints:
            readOnly: true
            idempotent: true
          call: "vizion.get-reference"
          with:
            reference_id: "tools.reference_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-container-reference
          description: "Cancel tracking and delete a container reference."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "vizion.delete-reference"
          with:
            reference_id: "tools.reference_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-tracking-updates
          description: "Retrieve all tracking milestone events for a container reference (polling method)."
          hints:
            readOnly: true
            idempotent: true
          call: "vizion.list-reference-updates"
          with:
            reference_id: "tools.reference_id"
          outputParameters:
            - type: object
              mapping: "$."
